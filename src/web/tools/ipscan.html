<!DOCTYPE html>
<html>
    <head>
        <meta name="zoraxy.csrf.Token" content="{{.csrfToken}}">
        <meta name="apple-mobile-web-app-capable" content="yes" />
        <meta name="viewport" content="user-scalable=no, width=device-width, initial-scale=1, maximum-scale=1"/>
        <meta charset="UTF-8">
        <meta name="theme-color" content="#4b75ff">
        <link rel="icon" type="image/png" href="./favicon.png" />
        <title>IP Scanner | Zoraxy</title>
        <link rel="stylesheet" href="../script/semantic/semantic.min.css">
        <script src="../script/jquery-3.6.0.min.js"></script>
        <script src="../script/semantic/semantic.min.js"></script>
        <script src="../script/tablesort.js"></script>
        <link rel="stylesheet" href="../main.css">
        <script src="../script/utils.js"></script>
        <style>
            .offlinehost{
                display: none;
            }
        </style>
    </head>
    <body>
        <link rel="stylesheet" href="../darktheme.css">
        <script src="../script/darktheme.js"></script>
        <div class="ui container">
            <br>
            <div class="ui segment">
                <div style="padding: 1em;">
                    <h4 class="ui dividing header">Connected Subnets</h4>
                    <div class="ui form">
                        <div class="field">
                            <label>Select a connected subnet to auto-fill the IP range below</label>
                            <select class="ui fluid dropdown" id="subnet-select">
                                <option value="">-- Loading subnets... --</option>
                            </select>
                        </div>
                    </div>
                    <br>
                    <div class="ui stackable grid">
                        <div class="eight wide column">
                            <h4 class="ui dividing header">Scan IP Range</h4>
                            <div class="ui form">
                                <div class="field">
                                    <label>Start IP</label>
                                    <input type="text" id="start-ip" name="start-ip">
                                </div>
                                <div class="field">
                                    <label>End IP</label>
                                    <input type="text" id="end-ip" name="end-ip">
                                </div>
                                <button class="ui basic button scanbtn" id="ip-scan-btn"><i class="blue search icon"></i> Scan</button>
                            </div>
                            <br>
                        </div>
                        <div class="eight wide column">
                            <h4 class="ui dividing header">Scan CIDR Range</h4>
                            <div class="ui form">
                                <div class="field">
                                    <label>CIDR</label>
                                    <input type="text" id="cidr" name="cidr">
                                </div>
                                <button class="ui basic button scanbtn" id="cidr-scan-btn"><i class="blue search icon"></i> Scan</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <button class="ui basic button" onclick="toggleOfflineHost();"><i class="grey eye icon"></i>View Offline Hosts</button>
            <div class="ui divider"></div>
            <br>
                <div id="scan-results" style="overflow-x: auto;">
                   
                </div>
            <br>
            <div style="float: right;">
                <button class="ui basic button" style="margin-right: 1em;" onclick="window.open('', '_self', ''); window.close();"><i class="ui red remove icon"></i> Close</button>
            </div>
            <br><br><br>
        </div>
        <script>
            $(document).ready(function() {
                // Load connected subnets into the dropdown
                $.get("/api/stats/listnic", function(data) {
                    var select = $('#subnet-select');
                    select.empty();
                    select.append('<option value="">-- Select a subnet --</option>');
                    if (data && data.length) {
                        $.each(data, function(i, iface) {
                            if (iface.IPs) {
                                $.each(iface.IPs, function(j, cidr) {
                                    // Only show IPv4 CIDR entries
                                    if (cidr.indexOf('/') !== -1 && cidr.indexOf('.') !== -1) {
                                        select.append('<option value="' + cidr + '">' + iface.Name + ' — ' + cidr + '</option>');
                                    }
                                });
                            }
                        });
                    } else {
                        select.append('<option value="">-- No subnets found --</option>');
                    }
                    select.dropdown();
                }).fail(function() {
                    $('#subnet-select').empty().append('<option value="">-- Failed to load subnets --</option>');
                });

                // Auto-fill start/end IP when a subnet is selected
                $('#subnet-select').on('change', function() {
                    var cidr = $(this).val();
                    if (!cidr) return;
                    var range = cidrToStartEnd(cidr);
                    if (range) {
                        $('#start-ip').val(range.start);
                        $('#end-ip').val(range.end);
                        // Also fill the CIDR field for convenience
                        var cidrOnly = cidr.split('/')[0].replace(/\.\d+$/, '.0') + '/' + cidr.split('/')[1];
                        $('#cidr').val(cidrOnly);
                    }
                });

                $('#ip-scan-btn').click(function(event) {
                    event.preventDefault();
                    var start = $('#start-ip').val().trim();
                    var end = $('#end-ip').val().trim();
                    if (start === '' || end === '') {
                        alert('Please enter start and end IP range');
                        return;
                    }

                    if (!isValidIPv4(start) || !isValidIPv4(end)){
                        alert('Invalid start or end ip address');
                        return;
                    }

                    // Warn for large or non-private IP ranges
                    var rangeSize = ipToInt(end) - ipToInt(start) + 1;
                    var warnMsg = '';
                    if (!isPrivateIPv4(start)) {
                        warnMsg = 'The selected IP range appears to be a public (non-private) address. Scanning public IP ranges may be inappropriate or illegal without authorization. Continue?';
                    } else if (rangeSize > 1024) {
                        warnMsg = 'The selected IP range is very large (' + rangeSize + ' addresses). This scan may take a long time. Continue?';
                    }
                    if (warnMsg && !confirm(warnMsg)) {
                        return;
                    }

                    $(".scanbtn").addClass("disabled");
                    $("#scan-results").html(`
                        <div class="ui basic segment" align="center">
                            <i class="loading spinner icon"></i> Scanning
                        </div>`);
                    $.cjax({
                        url: "/api/tools/ipscan",
                        data: {start: start, end: end},
                        method: "POST",
                        success: function(data){
                            displayResults(data);
                            $(".scanbtn").removeClass("disabled");
                        }
                    });
                });
        
                $('#cidr-scan-btn').click(function(event) {
                    event.preventDefault();
                    var cidr = $('#cidr').val().trim();
                    if (cidr === '') {
                        alert('Please enter CIDR notation');
                        return;
                    }

                    if (!isValidCIDR(cidr)){
                        alert("Invalid CIDR notation string given");
                        return;
                    }
                    $(".scanbtn").addClass("disabled");
                    $("#scan-results").html(`
                        <div class="ui basic segment" align="center">
                            <i class="loading spinner icon"></i> Scanning
                        </div>`);
                    $.cjax({
                        url: "/api/tools/ipscan",
                        method: "POST",
                        data: {cidr: cidr},
                        success: function(data) {
                            displayResults(data);
                            $(".scanbtn").removeClass("disabled");
                        }
                    });
                });

                function isValidCIDR(str) {
                    const cidrRegex = /^(\d{1,3}\.){3}\d{1,3}\/\d{1,2}$/;
                    return cidrRegex.test(str);
                }


                function isValidIPv4(ip) {
                    var regex = /^(?:[0-9]{1,3}\.){3}[0-9]{1,3}$/;
                    if (!regex.test(ip)) {
                        return false;
                    }
                    var parts = ip.split(".");
                    for (var i = 0; i < parts.length; i++) {
                        if (parseInt(parts[i], 10) > 255) {
                        return false;
                        }
                    }
                    return true;
                }

                function displayResults(data) {
                    var table = $('<table class="ui celled unstackable table"></table>');
                    var header = $(`<thead>
                        <tr>
                            <th>IP Address</th>
                            <th>Ping</th>
                            <th>Hostname</th>
                            <th>HTTP Detected</th>
                            <th>HTTPS Detected</th>
                            <th>Port Scan</th>
                        </tr>
                    </thead>`);
                    table.append(header);
                    var body = $('<tbody></tbody>');
                    var offlineHostCounter = 0;
                    for (var i = 0; i < data.length; i++) {
                        var classname = "offlinehost";
                        let hostIsOnline = data[i].Ping >= 0;
                        if (hostIsOnline){
                            classname = "onlinehost";
                        }else{
                            offlineHostCounter++;
                        }
                        var row = $('<tr class="' + classname + '"></tr>');
                        var status = data[i].Ping >= 0 ? '<i class="green circle icon"></i>' : '<i class="grey circle icon"></i>';
                        row.append($('<td>' + status + data[i].IP + '</td>'));
                        row.append($('<td>' + ((data[i].Ping>=0)?data[i].Ping+"ms":"Host Unreachable") + '</td>'));
                        row.append($('<td>' + data[i].Hostname + '</td>'));
                        row.append($('<td>' + (data[i].HttpPortDetected ? '<i class="green check icon"></i>' : '') + '</td>'));
                        row.append($('<td>' + (data[i].HttpsPortDetected ? '<i class="green check icon"></i>' : '') + '</td>'));
                        row.append($(`<td>${hostIsOnline ? `<button class="ui small basic button" onclick='launchToolWithSize("portscan.html?ip=${data[i].IP}", 1000, 640);'>Scan</button>`:''}</td>`));
                        body.append(row);
                    }

                    if (data.length == 0){
                        var body = $(`<tbody>
                        <tr>
                            <td colspan="5">
                                <i class="green circle check icon"></i> Discover no devices in given IP range
                            </td>
                        </tr>
                        </tbody>`);
                    }

                    if (offlineHostCounter == data.length){
                        //All offline
                        var body = $(`<tbody>
                        <tr>
                            <td colspan="5">
                                <i class="green circle check icon"></i> All hosts in given IP range are offline
                            </td>
                        </tr>
                        </tbody>`);
                    }
                    table.append(body);
                    $('#scan-results').empty().append(table);
                }
            });

            function toggleOfflineHost(){
                $(".offlinehost").toggle();
            }

            // Convert a CIDR string (e.g. "192.168.1.5/24") to {start, end} host range
            function cidrToStartEnd(cidr) {
                var parts = cidr.split('/');
                if (parts.length !== 2) return null;
                var ip = parts[0];
                var prefix = parseInt(parts[1], 10);
                if (isNaN(prefix) || prefix < 0 || prefix > 32) return null;
                var ipInt = ipToInt(ip);
                if (isNaN(ipInt)) return null;
                var mask = prefix === 0 ? 0 : (~0 << (32 - prefix)) >>> 0;
                var networkInt = (ipInt & mask) >>> 0;
                var broadcastInt = (networkInt | (~mask >>> 0)) >>> 0;
                var startInt = prefix >= 31 ? networkInt : networkInt + 1;
                var endInt   = prefix >= 31 ? broadcastInt : broadcastInt - 1;
                return { start: intToIp(startInt), end: intToIp(endInt) };
            }

            function ipToInt(ip) {
                var p = ip.split('.').map(Number);
                return ((p[0] * 16777216) + (p[1] * 65536) + (p[2] * 256) + p[3]) >>> 0;
            }

            function intToIp(n) {
                return [(n >>> 24) & 0xFF, (n >>> 16) & 0xFF, (n >>> 8) & 0xFF, n & 0xFF].join('.');
            }

            // Returns true if ip is in RFC1918 / loopback / link-local space
            function isPrivateIPv4(ip) {
                var p = ip.split('.').map(Number);
                return p[0] === 10 ||
                       p[0] === 127 ||
                       (p[0] === 172 && p[1] >= 16 && p[1] <= 31) ||
                       (p[0] === 192 && p[1] === 168) ||
                       (p[0] === 169 && p[1] === 254);
            }

            function launchToolWithSize(url, width, height){
                let windowName = Date.now();
                window.open(url,'w'+windowName,
                `toolbar=no,
                location=no,
                status=no,
                menubar=no,
                scrollbars=yes,
                resizable=yes,
                width=${width},
                height=${height}`);
            }


        </script>
    </body>
</html>
